########################################
# SERVICE
########################################
[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    UTC          On

########################################
# INPUTS : SYSLOG UDP & TCP
########################################
[INPUT]
    Name   syslog
    Mode   udp
    Listen 0.0.0.0
    Port   514
    Parser syslog-rfc3164
    Tag    syslog.udp

[INPUT]
    Name   syslog
    Mode   tcp
    Listen 0.0.0.0
    Port   5514
    Parser syslog-rfc3164
    Tag    syslog.tcp

########################################
# INPUTS : FILES
########################################
[INPUT]
    Name   tail
    Path   /var/log/suricata/eve.json
    Tag    suricata
    Parser json
    DB     /fluent-bit/state/suricata.db

########################################
# FILTERS
########################################
[FILTER]
    Name  modify
    Match *
    Add   source fluentbit

########################################
# OUTPUT : Backend API Python (FastAPI /ingest)
########################################
[OUTPUT]
    Name              http
    Match             *
    Host              backend-api
    Port              3000
    URI               /ingest
    Format            json
    Json_Date_Key     timestamp
    Json_Date_Format  iso8601
    Retry_Limit       3
