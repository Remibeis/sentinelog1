########################################
# PARSERS GENERIQUES
########################################

[PARSER]
    Name        syslog-rfc3164
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<timestamp>[^ ]+ [^ ]+ [^ ]+) (?<host>[^ ]+) (?<ident>[a-zA-Z0-9_\-\/\.]+)(?:\[(?<pid>[0-9]+)\])?: (?<message>.*)$
    Time_Key    timestamp
    Time_Format %b %d %H:%M:%S

########################################
# SSHD (auth.log / syslog)
########################################

# Exemple : Jan  8 12:36:01 host sshd[1234]: Failed password for invalid user admin from 192.168.1.42 port 22 ssh2

[PARSER]
    Name        sshd
    Format      regex
    Regex       ^(?<timestamp>[^ ]+ [^ ]+ [^ ]+) (?<host>[^ ]+) sshd\[(?<pid>[0-9]+)\]: (?<sshd_message>.*)$
    Time_Key    timestamp
    Time_Format %b %d %H:%M:%S

# Extraction plus fine pour "Failed password" (optionnel, tu peux l'utiliser plus tard si tu veux matcher plus précisément)

[PARSER]
    Name        sshd_failed_password
    Format      regex
    Regex       ^Failed password for( invalid user)? (?<user>[a-zA-Z0-9_\-]+) from (?<src_ip>[0-9\.]+) port (?<src_port>[0-9]+) (?<protocol>[a-zA-Z0-9]+)$

########################################
# APACHE HTTPD
########################################

# Access log en "combined" :
# 192.168.1.10 - - [08/Jan/2026:12:34:56 +0000] "GET /index.html HTTP/1.1" 200 1234 "-" "User-Agent"

[PARSER]
    Name        apache_combined
    Format      regex
    Regex       ^(?<client_ip>[^ ]*) (?<identd>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>[A-Z]+) (?<path>[^ ]*) (?<protocol>[^"]*)" (?<status>[0-9]{3}) (?<bytes_sent>[^ ]*) "(?<referer>[^"]*)" "(?<agent>[^"]*)"?$
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z

# Error log Apache :
# [Wed Jan 08 12:34:56.789012 2026] [core:error] [pid 1234] [client 192.168.1.42:54321] AH00123: message...

[PARSER]
    Name        apache_error
    Format      regex
    Regex       ^\[(?<time>[^\]]+)\] \[(?<module>[^\:]+):(?<level>[^\]]+)\]( \[pid (?<pid>[0-9]+)\])?( \[client (?<client>[^\]]+)\])? (?<message>.*)$
    Time_Key    time
    Time_Format %a %b %d %H:%M:%S.%L %Y

########################################
# NGINX
########################################

# Access log type combined (pattern par défaut très proche d’Apache) :
# 192.168.1.10 - - [08/Jan/2026:12:34:56 +0000] "GET / HTTP/1.1" 200 612 "-" "User-Agent" "-"

[PARSER]
    Name        nginx_access
    Format      regex
    Regex       ^(?<client_ip>[^ ]*) (?<identd>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>[A-Z]+) (?<path>[^ ]*) (?<protocol>[^"]*)" (?<status>[0-9]{3}) (?<bytes_sent>[^ ]*) "(?<referer>[^"]*)" "(?<agent>[^"]*)".*$
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z

# Error log Nginx :
# 2026/01/08 12:34:56 [error] 1234#1234: *1 message, client: 192.168.1.42, server: _, request: "GET / HTTP/1.1", host: "..."

[PARSER]
    Name        nginx_error
    Format      regex
    Regex       ^(?<time>[0-9]{4}\/[0-9]{2}\/[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}) \[(?<level>[^\]]+)\] (?<pid>[0-9]+)#(?<tid>[0-9]+): \*(?<connection>[0-9]+) (?<message>.*)$
    Time_Key    time
    Time_Format %Y/%m/%d %H:%M:%S

########################################
# FAIL2BAN
########################################

# Exemple :
# Jan  8 12:36:01 host fail2ban.filter[1234]: INFO [sshd] Found 192.168.1.42 - 2026-01-08 12:36:01
# Jan  8 12:36:01 host fail2ban.actions[1234]: NOTICE [sshd] Ban 192.168.1.42

[PARSER]
    Name        fail2ban
    Format      regex
    Regex       ^(?<timestamp>[^ ]+ [^ ]+ [^ ]+) (?<host>[^ ]+) (?<program>fail2ban\.(?<component>[^\[]+))\[(?<pid>[0-9]+)\]: (?<level>[A-Z]+) \[(?<jail>[^\]]+)\] (?<action>.*)$
    Time_Key    timestamp
    Time_Format %b %d %H:%M:%S

########################################
# UFW (Uncomplicated Firewall)
########################################

# Exemple :
# Jan  8 12:36:01 host kernel: [123456.789012] [UFW BLOCK] IN=eth0 OUT= MAC=... SRC=192.168.1.42 DST=192.168.1.10 LEN=60 ...

[PARSER]
    Name        ufw
    Format      regex
    Regex       ^(?<timestamp>[^ ]+ [^ ]+ [^ ]+) (?<host>[^ ]+) kernel: \[[^\]]+\] \[UFW (?<action>[A-Z]+)\] (?<fields>.*)$
    Time_Key    timestamp
    Time_Format %b %d %H:%M:%S

########################################
# SURICATA (EVE JSON)
########################################

# Exemple : ligne JSON complète
# {"timestamp":"2026-01-08T12:34:56.789012+0000","event_type":"alert",...}

[PARSER]
    Name        json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z

########################################
# GENERIC JSON (applis custom, logs REST, etc.)
########################################

[PARSER]
    Name        json_generic
    Format      json