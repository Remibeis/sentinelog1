version: '3.9'

# ══════════════════════════════════════════════════════════════════════════════
#  SentineLog SIEM — Stack Python
#  Déploiement: docker compose up -d --build
#  Dashboard:   http://localhost:8080
#  API:         http://localhost:3000
#  Kibana:      http://localhost:5601
#  ES:          http://localhost:9200
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: sentinelog-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sentinelog-net

  # ── Kibana ─────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: sentinelog-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - sentinelog-net

  # ── Fluent Bit : collecte logs ─────────────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:2.2.3
    container_name: sentinelog-fluent-bit
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./collector/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./collector/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./collector/state:/fluent-bit/state
      # Monte les logs de l'hôte Windows Server (adapter les chemins si besoin)
      # - C:/Windows/System32/winevt/Logs:/var/log/winevt:ro
    ports:
      - "514:514/udp"
      - "5514:5514/tcp"
    networks:
      - sentinelog-net

  # ── Backend API Python/FastAPI ─────────────────────────────────────────────
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: sentinelog-backend
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_URL=http://elasticsearch:9200
      - ES_INDEX=sentinelog-logs
      - SYSLOG_PORT=5140
      - API_PORT=3000
    ports:
      - "3000:3000"
      - "5140:5140/udp"    # Syslog UDP direct vers l'API (port alternatif, non-root)
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Data Processor Python ─────────────────────────────────────────────────
  data-processor:
    build:
      context: ./data-processor
      dockerfile: Dockerfile
    container_name: sentinelog-processor
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_URL=http://elasticsearch:9200
      - ES_INDEX=sentinelog-logs
      - POLL_INTERVAL=10
      - BATCH_SIZE=500
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Frontend Dashboard ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelog-frontend
    depends_on:
      - backend-api
    ports:
      - "8080:80"
    networks:
      - sentinelog-net
    restart: unless-stopped

volumes:
  es-data:
    driver: local

networks:
  sentinelog-net:
    driver: bridge
