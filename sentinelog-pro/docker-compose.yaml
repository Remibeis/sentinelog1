# ══════════════════════════════════════════════════════════════════════
#  SentineLog PRO — Docker Compose Production
#  Déploiement: docker compose up -d --build
# ══════════════════════════════════════════════════════════════════════

services:

  # ── Elasticsearch ────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: sentinelog-elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - bootstrap.memory_lock=true
      - cluster.name=sentinelog-cluster
      - node.name=sentinelog-node-1
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Kibana ────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: sentinelog-kibana
    hostname: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=sentinelog-kibana
      - SERVER_BASEPATH=
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=sentinelog-kibana-secret-key-32chars
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q 'available' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Fluent Bit ────────────────────────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:2.2.3
    container_name: sentinelog-fluent-bit
    hostname: fluent-bit
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./collector/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./collector/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./collector/state:/fluent-bit/state
      # Décommenter pour collecter les logs de l'hôte Windows Server :
      # - C:/Windows/System32/winevt/Logs:/var/log/winevt:ro
    ports:
      - "514:514/udp"     # Syslog UDP standard
      - "5514:5514/tcp"   # Syslog TCP alternatif
      - "2020:2020"       # Fluent Bit monitoring HTTP
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Backend API Python/FastAPI ────────────────────────────────────────
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: sentinelog-backend
    hostname: backend-api
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_URL=http://elasticsearch:9200
      - ES_INDEX=sentinelog-logs
      - API_PORT=3000
      - SYSLOG_PORT=5140
    ports:
      - "3000:3000"
      - "5140:5140/udp"   # Syslog UDP direct API
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Data Processor Python ─────────────────────────────────────────────
  data-processor:
    build:
      context: ./data-processor
      dockerfile: Dockerfile
    container_name: sentinelog-processor
    hostname: data-processor
    depends_on:
      elasticsearch:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    environment:
      - ES_URL=http://elasticsearch:9200
      - ES_INDEX=sentinelog-logs
      - POLL_INTERVAL=10
      - BATCH_SIZE=500
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Frontend Dashboard ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelog-frontend
    hostname: frontend
    depends_on:
      backend-api:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Init Kibana (one-shot) ─────────────────────────────────────────────
  kibana-init:
    image: python:3.12-slim
    container_name: sentinelog-kibana-init
    depends_on:
      kibana:
        condition: service_healthy
    volumes:
      - ./kibana:/app
    command: python /app/init_kibana.py
    networks:
      - sentinelog-net
    restart: "no"

volumes:
  es-data:
    driver: local

networks:
  sentinelog-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
