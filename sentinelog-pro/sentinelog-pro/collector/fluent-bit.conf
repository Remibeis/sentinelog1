########################################
# SENTINELOG PRO — Fluent Bit Config
# Sources : Syslog UDP/TCP, Apache, Nginx,
#           Firewall (UFW/iptables), fichiers systeme
########################################

[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    UTC          On
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

########################################
# INPUTS SYSLOG
########################################

# Syslog UDP 514 (Linux, équipements réseau, firewalls)
[INPUT]
    Name              syslog
    Mode              udp
    Listen            0.0.0.0
    Port              514
    Parser            syslog-rfc3164
    Tag               syslog.udp
    Buffer_Chunk_Size 32000
    Buffer_Max_Size   64000

# Syslog TCP 514
[INPUT]
    Name              syslog
    Mode              tcp
    Listen            0.0.0.0
    Port              5514
    Parser            syslog-rfc3164
    Tag               syslog.tcp

# Syslog UDP 5514 (port alternatif pour devices non-root)
[INPUT]
    Name   syslog
    Mode   udp
    Listen 0.0.0.0
    Port   5514
    Parser syslog-rfc3164
    Tag    syslog.alt

########################################
# INPUTS FICHIERS LOGS
########################################

# Auth logs Linux (SSH, sudo, PAM)
[INPUT]
    Name        tail
    Path        /var/log/auth.log,/var/log/secure
    Tag         linux.auth
    Parser      syslog-rfc3164
    DB          /fluent-bit/state/auth.db
    Refresh_Interval 5

# Syslog système Linux
[INPUT]
    Name        tail
    Path        /var/log/syslog,/var/log/messages
    Tag         linux.syslog
    Parser      syslog-rfc3164
    DB          /fluent-bit/state/syslog.db
    Refresh_Interval 5

# Apache access
[INPUT]
    Name        tail
    Path        /var/log/apache2/access.log,/var/log/httpd/access_log
    Tag         web.apache.access
    Parser      apache_combined
    DB          /fluent-bit/state/apache_access.db

# Apache error
[INPUT]
    Name        tail
    Path        /var/log/apache2/error.log,/var/log/httpd/error_log
    Tag         web.apache.error
    Parser      apache_error
    DB          /fluent-bit/state/apache_error.db

# Nginx access
[INPUT]
    Name        tail
    Path        /var/log/nginx/access.log
    Tag         web.nginx.access
    Parser      nginx_access
    DB          /fluent-bit/state/nginx_access.db

# Nginx error
[INPUT]
    Name        tail
    Path        /var/log/nginx/error.log
    Tag         web.nginx.error
    Parser      nginx_error
    DB          /fluent-bit/state/nginx_error.db

# Suricata IDS (EVE JSON)
[INPUT]
    Name        tail
    Path        /var/log/suricata/eve.json
    Tag         ids.suricata
    Parser      json
    DB          /fluent-bit/state/suricata.db

# Fail2ban
[INPUT]
    Name        tail
    Path        /var/log/fail2ban.log
    Tag         security.fail2ban
    Parser      syslog-rfc3164
    DB          /fluent-bit/state/fail2ban.db

# UFW / iptables firewall
[INPUT]
    Name        tail
    Path        /var/log/ufw.log,/var/log/kern.log
    Tag         firewall.ufw
    Parser      syslog-rfc3164
    DB          /fluent-bit/state/ufw.db

########################################
# FILTERS — Enrichissement
########################################

# Ajouter la source fluent-bit à tous les logs
[FILTER]
    Name  modify
    Match *
    Add   collector  fluentbit
    Add   collector_version 2.2.3

# Tag apache avec category web
[FILTER]
    Name  modify
    Match web.*
    Add   log_category web

# Tag syslog avec category system
[FILTER]
    Name  modify
    Match syslog.*
    Add   log_category syslog

[FILTER]
    Name  modify
    Match linux.*
    Add   log_category system

[FILTER]
    Name  modify
    Match ids.*
    Add   log_category ids

[FILTER]
    Name  modify
    Match firewall.*
    Add   log_category firewall

[FILTER]
    Name  modify
    Match security.*
    Add   log_category security

########################################
# OUTPUT — Backend API SentineLog
########################################

[OUTPUT]
    Name              http
    Match             *
    Host              backend-api
    Port              3000
    URI               /ingest
    Format            json
    Json_Date_Key     timestamp
    Json_Date_Format  iso8601
    Retry_Limit       5
    Workers           2
