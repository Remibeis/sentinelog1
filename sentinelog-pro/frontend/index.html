<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentineLog PRO — Secure SIEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:         #080c10;
      --bg2:        #0d1117;
      --bg3:        #111820;
      --border:     #1a2535;
      --accent:     #00e5ff;
      --accent2:    #ff4757;
      --accent3:    #2ed573;
      --warn:       #ffa502;
      --text:       #c9d1d9;
      --text-dim:   #586069;
      --crit:       #ff4757;
      --high:       #ff6b35;
      --med:        #ffa502;
      --low:        #2ed573;
      --info:       #00e5ff;
      --font-mono:  'Share Tech Mono', monospace;
      --font-ui:    'Exo 2', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 14px; min-height: 100vh; overflow-x: hidden; }

    /* ── Scanlines overlay ── */
    body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.015) 2px, rgba(0,229,255,0.015) 4px); pointer-events: none; z-index: 1000; }

    /* ── Login View (Security Overlay) ── */
    #login-view { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .login-card { background: var(--bg2); border: 1px solid var(--border); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 0 40px rgba(0,0,0,0.5); text-align: center; }
    .login-logo { font-family: var(--font-mono); font-size: 24px; color: var(--accent); margin-bottom: 30px; letter-spacing: 4px; text-transform: uppercase; }
    .login-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); padding: 12px 16px; border-radius: 6px; color: white; font-family: var(--font-mono); margin-bottom: 16px; outline: none; }
    .login-btn { width: 100%; padding: 12px; background: var(--accent); color: black; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
    #login-error { color: var(--accent2); font-size: 12px; margin-top: 12px; display: none; font-family: var(--font-mono); }

    /* ── Header ── */
    header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 18px; color: var(--accent); letter-spacing: 2px; }
    .logo-icon { width: 28px; height: 28px; border: 2px solid var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; animation: pulse-border 2s infinite; }
    @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 8px rgba(0,229,255,.3); } 50% { box-shadow: 0 0 20px rgba(0,229,255,.7); } }
    .clock { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); }

    /* ── Layout ── */
    #dashboard-view { display: none; }
    .layout { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 56px); }
    nav { background: var(--bg2); border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; }
    .nav-section { padding: 0 12px; margin-bottom: 24px; }
    .nav-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 6px; cursor: pointer; color: var(--text-dim); border: none; background: none; width: 100%; text-align: left; font-family: var(--font-ui); }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: rgba(0,229,255,.08); color: var(--accent); border-left: 2px solid var(--accent); }
    .logout-btn { color: var(--accent2); font-family: var(--font-mono); font-size: 11px; margin-top: auto; padding: 20px; text-align: center; cursor: pointer; border-top: 1px solid var(--border); }

    /* ── Main Dashboard Style ── */
    main { padding: 24px; overflow-y: auto; }
    .page { display: none; }
    .page.active { display: block; }
    .metrics-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
    .metric-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; position: relative; overflow: hidden; }
    .metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .metric-card.crit::before { background: var(--crit); }
    .metric-card.total::before { background: var(--accent); }
    .metric-value { font-family: var(--font-mono); font-size: 32px; font-weight: 700; color: var(--accent); }
    .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
    .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; padding: 15px; }
    table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
    th { text-align: left; color: var(--text-dim); padding-bottom: 10px; border-bottom: 1px solid var(--border); font-size: 10px; letter-spacing: 1px; }
    td { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sev-badge { padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }
    .sev-CRITICAL { color: var(--crit); border: 1px solid var(--crit); background: rgba(255,71,87,.1); }

    /* ── IP Bars ── */
    .ip-bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .ip-bar-label { font-family: var(--font-mono); font-size: 11px; color: var(--accent); width: 120px; }
    .ip-bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .ip-bar-fill { height: 100%; background: var(--accent); transition: width .6s; }

    /* ── Filters ── */
    .filters { display: flex; gap: 10px; margin-bottom: 16px; }
    .filter-input { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: white; padding: 8px; font-family: var(--font-mono); font-size: 12px; outline: none; }
  </style>
</head>
<body>

<!-- Vue Login -->
<div id="login-view">
  <div class="login-card">
    <div class="login-logo">⬡ SENTINELOG PRO</div>
    <form id="login-form">
      <input type="text" id="username" class="login-input" placeholder="UTILISATEUR" required>
      <input type="password" id="password" class="login-input" placeholder="MOT DE PASSE" required>
      <button type="submit" class="login-btn">Accès Sécurisé</button>
    </form>
    <div id="login-error">Accès refusé. Identifiants invalides.</div>
  </div>
</div>

<!-- Vue Dashboard Principal (Restaurée) -->
<div id="dashboard-view">
  <header>
    <div class="logo"><div class="logo-icon">⬡</div> SENTINELOG</div>
    <div style="display:flex; align-items:center; gap:20px">
      <div id="es-status" style="font-size:10px; font-family:var(--font-mono); color:var(--accent3)">● API SECURE</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <div class="layout">
    <nav>
      <div class="nav-section">
        <div class="nav-label">Vues</div>
        <button class="nav-item active" onclick="showPage('dashboard')">▦ Dashboard</button>
        <button class="nav-item" onclick="showPage('logs')">≡ Journal Logs</button>
        <button class="nav-item" onclick="showPage('alerts')">⚡ Alertes</button>
      </div>
      <div class="logout-btn" onclick="logout()">[ DÉCONNEXION ]</div>
    </nav>

    <main>
      <!-- Page Dashboard -->
      <div class="page active" id="page-dashboard">
        <div class="metrics-grid">
          <div class="metric-card total"><div>Total Logs</div><div class="metric-value" id="m-total">—</div></div>
          <div class="metric-card crit"><div>Critical</div><div class="metric-value" id="m-crit" style="color:var(--crit)">—</div></div>
        </div>
        
        <div class="grid-3">
          <div class="panel">
            <h3 class="nav-label">Activité Temps Réel</h3>
            <canvas id="chart-timeline" height="100"></canvas>
          </div>
          <div class="panel">
            <h3 class="nav-label">Top IPs Sources</h3>
            <div id="top-ips-body"></div>
          </div>
        </div>

        <div class="panel">
          <h3 class="nav-label">Derniers Événements Détectés</h3>
          <table>
            <thead><tr><th>TIMESTAMP</th><th>SEV</th><th>IP (RGPD)</th><th>MESSAGE</th></tr></thead>
            <tbody id="logs-recent-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Page Logs -->
      <div class="page" id="page-logs">
        <div class="filters">
          <input type="text" id="f-search" class="filter-input" placeholder="Rechercher..." style="width:300px">
          <button onclick="loadLogs()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:6px; cursor:pointer">Filtrer</button>
        </div>
        <div class="panel">
          <table>
            <thead><tr><th>TIMESTAMP</th><th>SÉVÉRITÉ</th><th>CATÉGORIE</th><th>IP</th><th>MESSAGE</th></tr></thead>
            <tbody id="logs-full-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  const API_BASE = "/api";
  let chartTimeline = null;

  // ── Auth Logic ──────────────────────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');

    const resp = await fetch(`${API_BASE}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ 'username': user, 'password': pass })
    });

    if (resp.ok) {
      const data = await resp.json();
      sessionStorage.setItem('token', data.access_token);
      initApp();
    } else {
      errorEl.style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('token');
    location.reload();
  }

  async function secureFetch(path) {
    const token = sessionStorage.getItem('token');
    if (!token) return logout();
    const resp = await fetch(`${API_BASE}${path}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (resp.status === 401) return logout();
    return resp.ok ? await resp.json() : null;
  }

  // ── App Logic ───────────────────────────────────────────────────────────
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    if (id === 'logs') loadLogs();
  }

  async function initApp() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('dashboard-view').style.display = 'block';
    initCharts();
    refreshDashboard();
    setInterval(refreshDashboard, 15000);
  }

  function initCharts() {
    const ctx = document.getElementById('chart-timeline').getContext('2d');
    chartTimeline = new Chart(ctx, {
      type: 'bar',
      data: { labels: [], datasets: [{ label: 'Logs', data: [], backgroundColor: 'rgba(0,229,255,0.2)', borderColor: '#00e5ff', borderWidth: 1 }] },
      options: { scales: { y: { beginAtZero: true, grid: { color: '#1a2535' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
    });
  }

  async function refreshDashboard() {
    const stats = await secureFetch('/stats');
    if (stats) {
      document.getElementById('m-total').textContent = stats.total_logs || 0;
      document.getElementById('m-crit').textContent = stats.by_severity?.CRITICAL || 0;
      
      // Top IPs
      const ipBody = document.getElementById('top-ips-body');
      ipBody.innerHTML = (stats.top_ips || []).slice(0, 5).map(ip => `
        <div class="ip-bar-item">
          <div class="ip-bar-label">${ip.ip}</div>
          <div class="ip-bar-track"><div class="ip-bar-fill" style="width:${Math.min(100, ip.count*5)}%"></div></div>
        </div>
      `).join('');
    }

    const logs = await secureFetch('/logs?size=10');
    if (logs?.logs) {
      document.getElementById('logs-recent-body').innerHTML = logs.logs.map(l => `
        <tr>
          <td>${new Date(l.timestamp).toLocaleTimeString()}</td>
          <td><span class="sev-badge sev-${l.severity}">${l.severity}</span></td>
          <td style="color:var(--accent)">${l.ip || '—'}</td>
          <td>${escHtml(l.message.slice(0, 70))}...</td>
        </tr>
      `).join('');
    }
  }

  async function loadLogs() {
    const search = document.getElementById('f-search').value;
    const data = await secureFetch(`/logs?size=50${search ? '&search='+search : ''}`);
    if (data?.logs) {
      document.getElementById('logs-full-body').innerHTML = data.logs.map(l => `
        <tr>
          <td>${new Date(l.timestamp).toLocaleString()}</td>
          <td><span class="sev-badge sev-${l.severity}">${l.severity}</span></td>
          <td>${l.category}</td>
          <td style="color:var(--accent)">${l.ip}</td>
          <td>${escHtml(l.message)}</td>
        </tr>
      `).join('');
    }
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  
  setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
  document.getElementById('login-form').addEventListener('submit', handleLogin);
  
  if (sessionStorage.getItem('token')) initApp();
</script>
</body>
</html>
