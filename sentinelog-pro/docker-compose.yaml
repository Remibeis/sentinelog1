# ══════════════════════════════════════════════════════════════════════
#  SentineLog PRO — Docker Compose Production (Secured)
# ══════════════════════════════════════════════════════════════════════

services:

  # ── Elasticsearch ────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: sentinelog-elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - bootstrap.memory_lock=true
      - cluster.name=sentinelog-cluster
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTIC_PASSWORD} -sf http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Redis (Persistent state for correlations) ──────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sentinelog-redis
    hostname: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Kibana ────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: sentinelog-kibana
    hostname: kibana
    depends_on:
      elasticsearch: { condition: service_healthy }
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - SERVER_NAME=sentinelog-kibana
      - XPACK_SECURITY_ENABLED=true
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q 'available' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Fluent Bit ────────────────────────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:2.2.3
    container_name: sentinelog-fluent-bit
    hostname: fluent-bit
    depends_on:
      elasticsearch: { condition: service_healthy }
    volumes:
      - ./collector/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./collector/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./collector/state:/fluent-bit/state
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Backend API Python/FastAPI ────────────────────────────────────────
  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    container_name: sentinelog-backend
    hostname: backend-api
    depends_on:
      elasticsearch: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - ES_URL=http://elasticsearch:9200
      - ES_USER=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - ES_INDEX=sentinelog-logs
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - API_PORT=3000
    ports:
      - "3000:3000"
      - "5140:5140/udp"
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Data Processor Python ─────────────────────────────────────────────
  data-processor:
    build:
      context: .
      dockerfile: data-processor/Dockerfile
    container_name: sentinelog-processor
    hostname: data-processor
    depends_on:
      elasticsearch: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - ES_URL=http://elasticsearch:9200
      - ES_USER=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      - POLL_INTERVAL=10
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Frontend Dashboard ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelog-frontend
    hostname: frontend
    depends_on:
      backend-api: { condition: service_healthy }
    ports:
      - "8080:80"
    networks:
      - sentinelog-net
    restart: unless-stopped

  # ── Init Kibana (one-shot) ─────────────────────────────────────────────
  kibana-init:
    image: python:3.12-slim
    container_name: sentinelog-kibana-init
    depends_on:
      kibana: { condition: service_healthy }
    volumes:
      - ./kibana:/app
    environment:
      - KIBANA_URL=http://kibana:5601
      - ES_URL=http://elasticsearch:9200
      - ES_USER=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
    command: python /app/init_kibana.py
    networks:
      - sentinelog-net
    restart: "no"

volumes:
  es-data:
  redis-data:

networks:
  sentinelog-net:
    driver: bridge
